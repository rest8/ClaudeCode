# Omakase Auto-Booker Configuration
# Copy this file to config.yaml and fill in your details.

# --- Google Calendar ---
google_credentials_path: "credentials.json"   # OAuth2 credentials from Google Cloud Console
google_token_path: "token.json"               # Will be created on first auth
calendar_id: "primary"                        # Calendar ID to check for free slots

# --- Omakase Account ---
omakase_email: "your-email@example.com"
omakase_password: "your-password"

# --- Booking Preferences ---
booking_months_ahead: 2       # How many months ahead to search for availability
min_free_hours: 3.0           # Minimum free time block (hours) needed in calendar

# --- Target Restaurants ---
# Add restaurants you want to auto-book.
# Find the URL from your Omakase restaurant page (e.g. https://omakase.in/r/xx123456).
#
# booking_mode: "first_come" (先着順) or "lottery" (抽選制)
#
# candidate_dates: User-specified dates (YYYY-MM-DD) to try booking.
#   If omitted, dates are determined from Google Calendar free slots.
#   If specified, these dates are used directly (calendar check skipped).
target_restaurants:
  - name: "鮨 さいとう"
    omakase_url: "https://omakase.in/r/example123"
    party_size: 2
    preferred_times:
      - "18:00"
      - "19:00"
    course_keyword: null
    booking_mode: "first_come"
    watch_cancellations: true       # Monitor for cancellation openings
    candidate_dates:              # Specific dates to try (optional)
      - "2026-04-15"
      - "2026-04-16"
      - "2026-04-22"

  - name: "すきやばし次郎"
    omakase_url: "https://omakase.in/r/example456"
    party_size: 2
    preferred_times:
      - "11:30"
      - "18:00"
      - "19:00"
    course_keyword: null
    booking_mode: "lottery"       # This restaurant uses the raffle system
    watch_cancellations: true

# Note: レストランはGUIの「検索して追加」ボタンからエリア・ジャンル別に
#       OMAKASEの掲載レストランを検索して追加することもできます。

# --- Scheduling ---
check_interval_seconds: 30        # Normal polling interval (seconds)
fast_poll_interval_seconds: 0.5   # Fast polling near reservation open time (seconds)
fast_poll_window_minutes: 5       # Minutes before/after open time for fast polling
continuous_mode: true             # Always-on mode: keep monitoring for cancellations
cancellation_check_interval_seconds: 300  # How often to check for cancellations (5 min)

# --- Google Chat Approval ---
# 決済前にGoogle Chatで承認依頼を送信します。
# webhook URLを設定しない場合、アプリ上のダイアログで確認します。
gchat_webhook_url: ""             # Google Chat incoming webhook URL
gchat_callback_url: ""            # Public callback URL (e.g. ngrok forwarding URL)
approval_timeout_seconds: 300     # Approval timeout (5 min)
approval_fee_per_person: 390      # Seat reservation fee per person (JPY)

# --- Browser ---
headless: true                    # Set false for debugging (shows browser window)
browser_timeout_ms: 30000
dry_run: false                    # Set true to skip payment (動作検証用)
